# Shadowrocket 防DNS泄露配置 (中国直连 + 代理强制远程DNS)
# 适用于需要细致分流并防止DNS泄露的场景
# 最后测试建议: https://browserleaks.com/dns

[General]
# 跳过局域网及保留IP地址的流量，不经过代理处理
bypass-tun = 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 255.255.255.255/32

# DNS配置：本地DNS用于直连，远程DNS用于代理，这是防泄露的关键
dns-server = 223.5.5.5, 119.29.29.29
remote-dns = 8.8.8.8, 1.1.1.1

# 强制所有代理流量使用远程DNS解析
dns-sys = false

# 开启IPv6支持（如果你的网络环境支持）
ipv6 = false

[Rule]
# ---------- 规则优先级: 从上到下依次匹配 ----------

# 1. 局域网与保留IP直连 (已在bypass-tun中设置，此处为补充规则)
IP-CIDR,10.0.0.0/8,DIRECT
IP-CIDR,127.0.0.0/8,DIRECT
IP-CIDR,172.16.0.0/12,DIRECT
IP-CIDR,192.168.0.0/16,DIRECT
IP-CIDR,224.0.0.0/4,DIRECT

# 2. 广告与追踪域名屏蔽 (可根据需要增删)
DOMAIN-KEYWORD,adservice,REJECT
DOMAIN-KEYWORD,analytics,REJECT
DOMAIN-KEYWORD,doubleclick,REJECT
DOMAIN-KEYWORD,googleadservices,REJECT
DOMAIN-SUFFIX,adsrvr.org,REJECT

# 3. 重要的中国域名强制直连 (常见应用和系统服务)
# 腾讯系
DOMAIN-SUFFIX,qq.com,DIRECT
DOMAIN-SUFFIX,tencent.com,DIRECT
DOMAIN-SUFFIX,wechat.com,DIRECT
# 阿里系
DOMAIN-SUFFIX,alibaba.com,DIRECT
DOMAIN-SUFFIX,taobao.com,DIRECT
DOMAIN-SUFFIX,tmall.com,DIRECT
# 字节跳动系
DOMAIN-SUFFIX,toutiao.com,DIRECT
DOMAIN-SUFFIX,douyin.com,DIRECT
# 百度系
DOMAIN-SUFFIX,baidu.com,DIRECT
DOMAIN-SUFFIX,baidustatic.com,DIRECT
# 其他主流中国站点
DOMAIN-SUFFIX,youku.com,DIRECT
DOMAIN-SUFFIX,iqiyi.com,DIRECT
DOMAIN-SUFFIX,bilibili.com,DIRECT
DOMAIN-SUFFIX,weibo.com,DIRECT
DOMAIN-SUFFIX,zhihu.com,DIRECT
# 中国政府与教育机构
DOMAIN-SUFFIX,gov.cn,DIRECT
DOMAIN-SUFFIX,edu.cn,DIRECT

# 4. 常见中国域名后缀直连
DOMAIN-SUFFIX,cn,DIRECT
# 注意：以下为中文域名的Punycode编码，确保覆盖
DOMAIN-SUFFIX,xn--fiqs8s,DIRECT # "中国" 域名 .中国
DOMAIN-SUFFIX,xn--fiqz9s,DIRECT # "公司" 域名 .公司
DOMAIN-SUFFIX,xn--55qx5d,DIRECT # "网络" 域名 .网络

# 5. 基于GeoIP的中国IP直连 (使用no-resolve避免对域名提前解析)
GEOIP,CN,DIRECT

# 6. 需要代理的国外域名
DOMAIN-SUFFIX,google.com,Proxy
DOMAIN-SUFFIX,youtube.com,Proxy
DOMAIN-SUFFIX,twitter.com,Proxy
DOMAIN-SUFFIX,facebook.com,Proxy
DOMAIN-SUFFIX,instagram.com,Proxy
DOMAIN-SUFFIX,whatsapp.net,Proxy
DOMAIN-SUFFIX,telegram.org,Proxy
DOMAIN-SUFFIX,netflix.com,Proxy
DOMAIN-SUFFIX,spotify.com,Proxy
DOMAIN-SUFFIX,github.com,Proxy
DOMAIN-SUFFIX,stackoverflow.com,Proxy

# 7. 最终规则: 所有未匹配流量走代理，并强制使用远程DNS
FINAL,Proxy

[Host]
# 本地Hosts配置，可按需添加，例如：
# 127.0.0.1 localhost

[URL Rewrite]
# URL重写规则，可按需添加，例如：
# ^http://(.*)\.cn/ http://$1.cn/ 302
